name: finbud_app
description: Kişisel finans yönetimi uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.13.1
  google_fonts: ^8.0.2
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.0
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/finbudLogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env