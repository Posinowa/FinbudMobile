name: finbud_app
description: Kişisel finans yönetimi uygulaması
publish_to: 'none'
version: 1.0.3

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.4.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.13.1
  google_fonts: ^8.0.2
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  intl: ^0.20.2
  equatable: ^2.0.5
  lottie: ^3.1.0
  connectivity_plus: ^6.1.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  url_launcher: ^6.3.0
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/finbud_logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#4F5D75"
  adaptive_icon_foreground: "assets/logo/finbud_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env